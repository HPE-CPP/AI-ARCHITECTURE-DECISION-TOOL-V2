name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Backend — Lint + Tests
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    env:
      # Route tests to in-memory SQLite — no real DB needed
      DATABASE_URL: "sqlite:///./test_temp.db"
      ENVIRONMENT: "test"
      # Dummy values so Settings() validation doesn't fail
      OPENAI_API_KEY: "sk-test-dummy"
      APP_REDIS_URL: ""
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "./backend/requirements*.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run Tests (skip load tests)
        run: |
          pytest -m "not load" \
            --cov=app \
            --cov=services \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -p no:warnings \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        # Don't fail the build if Codecov token isn't set
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Frontend — Build + Lint
  # Uses `next build` as the primary correctness check.
  # This catches TypeScript errors, broken imports, and missing
  # env vars — the most reliable CI gate without a live server.
  # ──────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    env:
      # Stub so Next.js can compile without a real backend
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      # Needed by next build to skip telemetry
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        # Lint warnings are non-blocking but errors fail the build
        continue-on-error: false

      - name: Type-check & Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Frontend — Unit Tests (Vitest)
  # Runs only if tests are present. Kept separate so a test
  # failure doesn't block the build check above.
  # ──────────────────────────────────────────────────────────────
  frontend-unit-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/tests/coverage/lcov.info
          flags: frontend
